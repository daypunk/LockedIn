# Q&A interview question bank — `career` template
# Loaded by selfgraph.ingest.interview at runtime.
#
# Structure:
#   sections:        ordered list of interview sections
#     - name:        machine name (used in slugs)
#       prompt:      English wording shown to user (default)
#       prompt_ko:   Korean wording (used when --lang ko)
#       produces:    entity types this section is allowed to write
#       required:    fields that MUST be filled before the section ends
#       questions:   ordered list of questions; each can branch.
#
# Status: skeleton — full question bank lands with the interview engine.

version: 1
template: career
lang_default: en

sections:
  - name: identity
    prompt: "Let's start with you."
    prompt_ko: "당신부터 시작하겠습니다."
    produces: [person]
    required: [name, current_role]
    questions:
      - id: q_name
        text: "What's your name?"
        text_ko: "이름이 어떻게 되시나요?"
        writes: { entity: person, field: name }
      - id: q_current_role
        text: "What do you do, in one sentence?"
        text_ko: "현재 무슨 일을 하시나요? 한 문장으로요."
        writes: { entity: person, field: current_role }

  - name: companies_and_roles
    prompt: "Walk me through your work history."
    prompt_ko: "지금까지의 경력을 들려주세요."
    produces: [company, role]
    required: [at_least_one_role]
    questions:
      - id: q_recent_company
        text: "Where do you work right now (or most recently)?"
        text_ko: "지금 (또는 가장 최근에) 어디에서 일하시나요?"
      - id: q_role_title
        text: "What's your title there?"
        text_ko: "직책은 무엇인가요?"

  - name: projects
    prompt: "Tell me about the projects that mattered."
    prompt_ko: "기억에 남는 프로젝트를 알려주세요."
    produces: [project, achievement, skill]
    required: [at_least_two_projects]
    questions:
      - id: q_proudest_project
        text: "What's a project you're proudest of? What did it ship?"
        text_ko: "가장 자랑스러운 프로젝트가 뭐였나요? 무엇을 만들어 냈나요?"
      - id: q_metric
        text: "How did you measure success on that project?"
        text_ko: "그 프로젝트의 성공은 어떻게 측정했나요?"

# More sections (education, skills, decisions, learning) land with the
# interview engine implementation.
