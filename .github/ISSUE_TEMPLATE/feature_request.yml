name: Feature request
description: Suggest a new capability or refinement.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        lockedin is intentionally narrow — authoring quality matters
        more than feature breadth. Please describe the underlying
        problem before proposing the solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is the user trying to do that lockedin cannot do today?
      placeholder: "When I render a resume, I want to target a specific job description."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What change would solve this? Be concrete.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you weigh?
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Scope estimate
      description: Rough estimate. The maintainer will recheck.
      options:
        - Tiny (config flag, doc tweak)
        - Small (new prompt rule, new banned phrase)
        - Medium (new CLI subcommand, new fixture set)
        - Large (new renderer, new ontology entity type)
    validations:
      required: true

  - type: checkboxes
    id: alignment
    attributes:
      label: Alignment
      options:
        - label: This works inside the documented vault contract (no auto-modify of `~/.claude/settings.json` or write outside `~/Documents/LockedIn/`).
          required: true
        - label: This does not require an Anthropic API key (lockedin is subscription-only via Claude Code).
          required: true
